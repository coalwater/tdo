version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
    misspell:
      locale: US
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - testdata
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
